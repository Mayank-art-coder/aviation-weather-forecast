name: Aviation Forecast CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
permissions:
  contents: read
  packages: write
  
jobs:
  # ── JOB 1: TEST ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install numpy==1.26.4 scipy==1.11.4 pandas==2.2.2 scikit-learn==1.4.2
          pip install torch==2.2.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          
          pip install xgboost==2.0.3 \
            imbalanced-learn==0.12.2 \
            joblib \
            pyyaml \
            fastapi \
            uvicorn \
            pydantic \
            httpx \
            pytest
            
      - name: Verify Python packages
        run: |
          python -c "import numpy, torch, xgboost; print('NumPy:', numpy.__version__); print('Torch:', torch.__version__); print('XGBoost:', xgboost.__version__)"
          pip freeze | grep numpy
      
      - name: Regenerate scalers for CI
        run: python src/regenerate_models.py
        env:
          PYTHONPATH: .

      - name: Run preprocessing tests
        run: pytest tests/test_preprocessing.py -v
        env:
          PYTHONPATH: .

      - name: Run prediction tests
        run: pytest tests/test_predict.py -v
        env:
          PYTHONPATH: .

      - name: Run API tests
        run: pytest tests/test_api.py -v
        env:
          PYTHONPATH: .

  # ── JOB 2: LINT ─────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check src/ api/ tests/
        continue-on-error: true

      - name: Check imports with isort
        run: isort --check-only src/ api/ tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=100 \
            --ignore=E501,W503,E203 \
            --count
        continue-on-error: true

  # ── JOB 3: DOCKER BUILD ─────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag aviation-forecast:${{ github.sha }} \
            --tag aviation-forecast:latest \
            --file Dockerfile \
            .

      - name: Test Docker container health
        run: |
          docker run -d \
            --name forecast-test \
            -p 8000:8000 \
            aviation-forecast:latest

          # Wait for startup
          sleep 30

          # Health check
          curl -f http://localhost:8000/health || exit 1
          echo "Container health check passed"

          docker stop forecast-test
          docker rm forecast-test

      - name: Push to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker tag aviation-forecast:latest \
            ghcr.io/$IMAGE_NAME:latest

          docker tag aviation-forecast:${{ github.sha }} \
            ghcr.io/$IMAGE_NAME:${{ github.sha }}

          docker push ghcr.io/$IMAGE_NAME:latest
          docker push ghcr.io/$IMAGE_NAME:${{ github.sha }}

  # ── JOB 4: NOTIFY ───────────────────────────────────
  notify:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [test, lint, docker]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "Test:   ${{ needs.test.result }}"
          echo "Lint:   ${{ needs.lint.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          if [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.docker.result }}" == "success" ]; then
            echo "CI/CD PASSED — ready to deploy"
          else
            echo "CI/CD FAILED — check logs"
            exit 1
          fi
